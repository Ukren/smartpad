services:
  db:
    image: postgres:16
    container_name: smartpad-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smartpad
    ports:
      - '5432:5432'
    volumes:
      - smartpad-db-data:/var/lib/postgresql/data

volumes:
  smartpad-db-data:
